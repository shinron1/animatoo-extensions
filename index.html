<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مستودع إضافات Miru</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Tahoma,'Segoe UI',sans-serif}
body{background:#f0f2f5;color:#1a1a2e}
.hero{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;padding:40px 20px;text-align:center}
.hero h1{font-size:28px;font-weight:800}
.hero p{color:#a0aec0;margin-top:8px;font-size:14px}
.container{max-width:1200px;margin:0 auto;padding:20px}
.stats{display:flex;gap:15px;justify-content:center;margin-top:15px}
.stat{background:rgba(255,255,255,.08);padding:12px 25px;border-radius:8px;text-align:center}
.stat span{font-size:22px;font-weight:700;display:block}
.stat label{font-size:12px;color:#a0aec0}
.toolbar{background:#fff;padding:12px 18px;border-radius:10px;margin-bottom:15px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.search-wrap{display:flex;align-items:center;gap:8px;margin-right:auto}
.search-wrap input{padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;width:220px}
.search-wrap label{font-size:13px;display:flex;align-items:center;gap:5px;cursor:pointer}
.filters{display:flex;gap:8px;flex-wrap:wrap}
.filters button{background:#f0f2f5;border:1px solid #ddd;padding:6px 14px;border-radius:20px;cursor:pointer;font-size:12px;transition:.15s}
.filters button:hover,.filters button.active{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
.table-wrap{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08)}
table{width:100%;border-collapse:collapse}
thead{background:#1a1a2e;color:#fff}
th{padding:12px 14px;font-size:13px;text-align:right}
td{padding:10px 14px;font-size:13px;border-bottom:1px solid #f0f0f0}
tr:hover{background:#f8f9fa}
tr.nsfw{background:#fff5f5}
.badge{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
.badge-bangumi{background:#e3f2fd;color:#1565c0}
.badge-manga{background:#f3e5f5;color:#7b1fa2}
.badge-fikushon{background:#fff3e0;color:#e65100}
.nsfw-badge{background:#ffebee;color:#c62828;padding:2px 8px;border-radius:4px;font-size:11px}
.source-link{color:#1a73e8;text-decoration:none;font-size:12px}
.source-link:hover{text-decoration:underline}
.empty{text-align:center;padding:60px 20px;color:#999}
.footer{text-align:center;padding:30px;color:#666;font-size:13px}
@media(max-width:768px){
  .toolbar{flex-direction:column}
  .search-wrap{margin-right:0;width:100%}
  .search-wrap input{width:100%}
  table{font-size:12px}
  th,td{padding:8px 6px}
}
</style>
</head>
<body>
<div class="hero">
  <h1>📦 مستودع إضافات Miru</h1>
  <p>تصفح الإضافات المتاحة لمشغل Miru</p>
  <div class="stats">
    <div class="stat"><span id="totalCount">0</span><label>إجمالي</label></div>
    <div class="stat"><span id="bangumiCount">0</span><label> bangumi</label></div>
    <div class="stat"><span id="mangaCount">0</span><label> manga</label></div>
    <div class="stat"><span id="fikushonCount">0</span><label> fikushon</label></div>
  </div>
</div>
<div class="container">
  <div class="toolbar">
    <div class="search-wrap">
      <input type="text" id="search" placeholder="ابحث عن إضافة..." oninput="render()">
      <label><input type="checkbox" id="showNsfw" onchange="render()"> إظهار +18</label>
    </div>
    <div class="filters" id="typeFilters"></div>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>الاسم</th>
          <th>الحزمة</th>
          <th>الإصدار</th>
          <th>المطور</th>
          <th>اللغة</th>
          <th>النوع</th>
          <th></th>
          <th>الرابط</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none">
      <p>لا توجد إضافات تطابق بحثك</p>
    </div>
  </div>
  <div class="footer">
    <p>Miru extensions repository | <a href="https://github.com/miru-project/miru-app">Miru App Download</a></p>
  </div>
</div>
<script>
let extensions, activeType=null;

async function load(){
  try{
    const r=await fetch('index.json');
    extensions=await r.json();
    buildFilters();
    render()
  }catch(e){
    document.getElementById('tbody').innerHTML='<tr><td colspan="8" style="text-align:center;padding:40px;color:#999">فشل تحميل البيانات</td></tr>'
  }
}

function buildFilters(){
  const types=[...new Set(extensions.map(e=>e.type))];
  const div=document.getElementById('typeFilters');
  div.innerHTML='<button class="'+(activeType===null?'active':'')+'" onclick="setType(null)">الكل</button>';
  types.forEach(t=>{
    div.innerHTML+='<button class="'+(activeType===t?'active':'')+'" onclick="setType(\''+t+'\')">'+t+'</button>'
  })
}

function setType(t){activeType=t;buildFilters();render()}

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const show=document.getElementById('showNsfw').checked;
  let filtered=extensions.filter(e=>(show||e.nsfw!=='true')&&(!activeType||e.type===activeType)&&(!q||Object.values(e).some(v=>String(v).toLowerCase().includes(q))));
  document.getElementById('totalCount').textContent=extensions.length;
  document.getElementById('bangumiCount').textContent=extensions.filter(e=>e.type==='bangumi').length;
  document.getElementById('mangaCount').textContent=extensions.filter(e=>e.type==='manga').length;
  document.getElementById('fikushonCount').textContent=extensions.filter(e=>e.type==='fikushon').length;
  const tbody=document.getElementById('tbody');
  const empty=document.getElementById('empty');
  tbody.innerHTML='';
  if(!filtered.length){empty.style.display='block';return}
  empty.style.display='none';
  filtered.forEach(e=>{
    const tr=document.createElement('tr');
    if(e.nsfw==='true')tr.className='nsfw';
    tr.innerHTML='<td>'+(e.name||'')+'</td><td>'+(e.package||'')+'</td><td>'+(e.version||'')+'</td><td>'+(e.author||'')+'</td><td>'+(e.lang||'')+'</td><td><span class="badge badge-'+(e.type||'')+'">'+(e.type||'')+'</span></td><td>'+(e.nsfw==='true'?'<span class="nsfw-badge">+18</span>':'')+'</td><td><a class="source-link" href="https://github.com/shinron1/animatoo-extensions/blob/main/repo/'+e.url+'" target="_blank">الشفرة</a></td>';
    tbody.appendChild(tr)
  })
}
load()
</script>
</body>
</html>
